<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalkulator NJOP</title>

<link rel="icon" href="src/img/kalkulator.ico">
<link rel="stylesheet" href="src/css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">
  <div class="header">
    <h1>Kalkulator NJOP</h1>
    <p>Perhitungan berdasarkan nilai NJOP</p>
  </div>

<form id="nilaiPerolehanTanahForm">
<input type="text" id="namapenjual" placeholder="Nama Penjual" required>
<input type="text" id="namapembeli" placeholder="Nama Pembeli" required>

<input type="text" id="alamat" placeholder="Alamat" required>
<input type="text" id="alamattanah" placeholder="Alamat Tanah" required>

<input type="text" id="nonopsppt" placeholder="NOP SPPT" required>

<input type="number" id="njop" placeholder="NJOP Tanah" required>
<input type="number" id="njopBangunan" placeholder="NJOP Bangunan" required>

<input type="number" id="luasTanah" placeholder="Luas Tanah" required>
<input type="number" id="luasBangunan" placeholder="Luas Bangunan" required>

<br>
<input type="radio" name="hitungType" value="hitung-ajb" checked> AJB
<input type="radio" name="hitungType" value="hitung-segel"> Segel

<button type="submit">Hitung</button>
<button type="button" onclick="printResult()">Cetak</button>

<p>Gunakan Manual → <a href="animasi2.html">klik di sini</a></p>
</form>

<div id="hasil"></div>

<div class="footer">© Kalkulator Tanah</div>
</div>

<script src="src/js/script.js"></script>
<script>
function formatRupiah(angka) {
    return new Intl.NumberFormat('id-ID', {
        style: 'currency',
        currency: 'IDR',
        minimumFractionDigits: 0
    }).format(angka || 0);
}
        function printResult() {
            var namapenjual = document.getElementById("namapenjual").value;
            var namapembeli = document.getElementById("namapembeli").value;
            var jenisPerhitungan = document.querySelector('input[name="hitungType"]:checked').value;
            var hasilElem = document.getElementById("hasil").innerHTML;
    
            var popupWin = window.open('', '_blank', 'width=600,height=600');
            popupWin.document.open();
            popupWin.document.write('<html><head><title>Hasil manual ' + jenisPerhitungan + ' antara ' + namapenjual + ' dan ' + namapembeli + '</title><style>body { font-family: Arial, sans-serif; } h2 { margin-bottom: 20px; } p { margin-bottom: 10px; }</style></head><body onload="window.print()">' + hasilElem + '</body></html>');
            popupWin.document.close();
}
</script>

</body>
</html>
