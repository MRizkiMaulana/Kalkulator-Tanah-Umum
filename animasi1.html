<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#4a90e2,#6fb1fc);
  font-family:'Poppins',sans-serif;
  color:white;
  overflow:hidden;
}

/* WRAPPER */
.wrapper{
  text-align:center;
  transition:1s;
}

/* TYPING */
.typing{
  font-size:34px;
  font-weight:600;
  white-space:nowrap;
  overflow:hidden;
  border-right:3px solid rgba(255,255,255,0.9);
  width:0;
  animation:typing 2.5s steps(30,end) forwards, blink .7s infinite;
}

/* SUBTEXT */
.sub{
  margin-top:12px;
  font-size:15px;
  opacity:0;
  animation:fadeIn 1s ease forwards;
  animation-delay:2.5s;
}

/* LOADER */
.loader{
  margin-top:18px;
}

.loader span{
  display:inline-block;
  width:8px;
  height:8px;
  margin:0 4px;
  background:white;
  border-radius:50%;
  animation:bounce .6s infinite alternate;
}

.loader span:nth-child(2){animation-delay:.2s;}
.loader span:nth-child(3){animation-delay:.4s;}

/* ANIMATION */
@keyframes typing{
  from{width:0}
  to{width:100%}
}

@keyframes blink{
  50%{border-color:transparent;}
}

@keyframes fadeIn{
  to{opacity:1;}
}

@keyframes bounce{
  to{
    transform:translateY(-8px);
    opacity:.6;
  }
}

/* FADE OUT */
.fade-out{
  opacity:0;
  transform:scale(0.95);
}
</style>
</head>

<body>

<div class="wrapper" id="wrapper">

  <!-- GANTI TEXT SESUAI HALAMAN -->
  <div class="typing">Menyiapkan Kalkulator...</div>

  <div class="sub">NJOP</div>

  <div class="loader">
    <span></span>
    <span></span>
    <span></span>
  </div>

</div>

<script>
// Fade out dulu
setTimeout(()=>{
  document.getElementById('wrapper').classList.add('fade-out');
}, 4500);

// Redirect
setTimeout(()=>{
  window.location.href = "njop.html";
}, 5500);
</script>

</body>
</html>
