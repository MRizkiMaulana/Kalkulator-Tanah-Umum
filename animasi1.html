<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,#4a90e2,#6fb1fc);
  color:white;
  overflow:hidden;
}

/* WRAPPER */
.wrapper{
  text-align:center;
  padding:20px;
  max-width:90%;
  transition:0.5s;
}

/* TYPING */
.typing{
  font-size:36px;
  font-weight:600;
  border-right:3px solid white;
  white-space:nowrap;
  overflow:hidden;
  width:0;
  animation: typing 2.5s steps(30,end) forwards, blink .6s infinite;
}

/* SUBTEXT */
.sub{
  margin-top:12px;
  font-size:16px;
  opacity:0;
  animation:fadeIn 1s ease forwards;
  animation-delay:2.5s;
}

/* LOADER */
.loader{
  margin-top:15px;
}

.loader span{
  display:inline-block;
  width:8px;
  height:8px;
  background:white;
  border-radius:50%;
  margin:0 3px;
  animation:bounce .6s infinite alternate;
}

.loader span:nth-child(2){animation-delay:.2s;}
.loader span:nth-child(3){animation-delay:.4s;}

/* ANIMATION */
@keyframes typing{to{width:100%}}
@keyframes blink{50%{border-color:transparent}}
@keyframes fadeIn{to{opacity:1}}
@keyframes bounce{to{transform:translateY(-8px);opacity:.6}}

/* 📱 MOBILE */
@media (max-width: 768px){

  .typing{
    font-size:22px;
    letter-spacing:1px;
  }

  .sub{
    font-size:13px;
  }

  .loader span{
    width:6px;
    height:6px;
  }
}

/* 📱 EXTRA SMALL (HP kecil) */
@media (max-width: 400px){

  .typing{
    font-size:18px;
  }

  .sub{
    font-size:12px;
  }
}
</style>
</head>

<body>

<div class="wrapper" id="wrapper">

  <!-- GANTI TEXT SESUAI HALAMAN -->
  <div class="typing">Menyiapkan Kalkulator...</div>

  <div class="sub">NJOP</div>

  <div class="loader">
    <span></span>
    <span></span>
    <span></span>
  </div>

</div>

<script>
// Fade out dulu
setTimeout(()=>{
  document.getElementById('wrapper').classList.add('fade-out');
}, 4500);

// Redirect
setTimeout(()=>{
  window.location.href = "njop.html";
}, 5500);
</script>

</body>
</html>
