<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalkulator Tanah</title>
<link rel="icon" href="src/img/kalkulator.ico">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,#4a90e2,#6fb1fc);
  color:white;
}

.wrapper{text-align:center;}

.typing{
  font-size:36px;
  border-right:3px solid white;
  white-space:nowrap;
  overflow:hidden;
  width:0;
  animation: typing 2.5s steps(30,end) forwards, blink .6s infinite;
}

.sub{
  margin-top:12px;
  opacity:0;
  animation:fadeIn 1s ease forwards;
  animation-delay:2.5s;
}

.loader{margin-top:15px;}
.loader span{
  display:inline-block;
  width:8px;height:8px;
  background:white;border-radius:50%;
  margin:0 3px;
  animation:bounce .6s infinite alternate;
}
.loader span:nth-child(2){animation-delay:.2s;}
.loader span:nth-child(3){animation-delay:.4s;}

@keyframes typing{to{width:100%}}
@keyframes blink{50%{border-color:transparent}}
@keyframes fadeIn{to{opacity:1}}
@keyframes bounce{to{transform:translateY(-8px);opacity:.6}}
</style>
</head>

<body>
<div class="wrapper" id="app">
  <div class="typing">Kalkulator Tanah Umum</div>
  <div class="sub">Menyiapkan sistem...</div>
  <div class="loader"><span></span><span></span><span></span></div>
</div>

<script>
setTimeout(()=>{document.getElementById('app').style.opacity="0"},4500);
setTimeout(()=>{window.location.href="animasi2.html"},5500);
</script>
</body>
</html>
